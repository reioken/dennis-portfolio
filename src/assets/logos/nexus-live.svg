  <linearGradient id="nxg17" x1="335.45" y1="141.49" x2="431.04" y2="57.7" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#4a82fe"/><stop offset=".13" stop-color="#4a82fe"/><stop offset=".2" stop-color="#4a82fe"/><stop offset=".29" stop-color="#4a82fe"/><stop offset=".36" stop-color="#4a82fe"/><stop offset=".66" stop-color="#dcebff"/><stop offset=".78" stop-color="#f2f7ff"/><stop offset=".88" stop-color="#f2f7ff"/><stop offset=".93" stop-color="#f2f7ff"/></linearGradient>
  <!-- Facetten-Körper einmal definieren → Sichtbar + Silhouetten-Clip teilen sich die Geometrie -->
  <g id="nxBody">
    <polygon fill="url(#nxg1)" points="0 356.03 125.43 285.1 75.34 249.63 0 356.03"/>
    <polygon fill="url(#nxg2)" points="40.68 138.6 75.34 249.63 0 356.03 40.68 138.6"/>
    <polygon fill="url(#nxg3)" points="101.42 154.43 75.34 249.63 40.68 138.6 101.42 154.43"/>
    <polygon fill="url(#nxg4)" points="40.68 138.6 101.42 154.43 110.61 121.51 64.91 9.89 40.68 138.6"/>
    <polygon fill="url(#nxg5)" points="125.43 285.1 75.34 249.63 101.42 154.43 133.74 233.62 125.43 285.1"/>
    <polygon fill="url(#nxg6)" points="101.42 154.43 133.74 233.62 140.3 193.02 128.6 164.59 101.42 154.43"/>
    <polygon fill="url(#nxg7)" points="101.42 154.43 110.61 121.51 128.6 164.59 101.42 154.43"/>
    <polygon fill="url(#nxg8)" points="64.91 9.89 156.43 232.68 201.99 171.03 64.91 9.89"/>
    <polygon fill="url(#nxg9)" points="201.99 171.03 243.17 116.45 64.91 9.89 201.99 171.03"/>
    <polygon fill="url(#nxg10)" points="156.43 232.68 334.09 346.11 201.99 171.03 156.43 232.68"/>
    <polygon fill="url(#nxg11)" points="201.99 171.03 243.17 116.45 334.09 346.11 201.99 171.03"/>
    <polygon fill="url(#nxg12)" points="290.62 236.3 297.34 206.4 265.16 122.3 259.85 158.43 290.62 236.3"/>
    <polygon fill="url(#nxg13)" points="265.16 122.3 273.22 67.57 324.6 90.98 297.34 206.4 265.16 122.3"/>
    <polygon fill="url(#nxg14)" points="273.22 67.57 394.78 0 324.6 90.98 273.22 67.57"/>
    <polygon fill="url(#nxg15)" points="334.09 346.11 358.29 210.96 347.38 183.31 296.74 209.07 290.62 236.3 334.09 346.11"/>
    <polygon fill="url(#nxg16)" points="296.74 209.07 347.38 183.31 319.71 111.69 296.74 209.07"/>
    <polygon fill="url(#nxg17)" points="358.29 210.96 319.71 111.69 324.6 90.98 394.78 0 358.29 210.96"/>
  </g>
  <clipPath id="nxSil"><use href="#nxBody"/></clipPath>
  <!-- Diagonaler Lichtreflex (objectBoundingBox → wandert mit dem Rechteck) -->
  <!-- Kristall-Sweep: Violet→Blau→Eis (Splash + Mark-Idle + Brand-Hover) -->
  <linearGradient id="nxSweep" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ac8bfd" stop-opacity="0"/>
    <stop offset=".38" stop-color="#ac8bfd" stop-opacity="0"/>
    <stop offset=".46" stop-color="#ac8bfd" stop-opacity=".5"/>
    <stop offset=".5" stop-color="#4a82fe" stop-opacity=".68"/>
    <stop offset=".54" stop-color="#dcebff" stop-opacity=".42"/>
    <stop offset=".62" stop-color="#4a82fe" stop-opacity="0"/>
    <stop offset="1" stop-color="#ac8bfd" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="nxBrandSweep" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ac8bfd" stop-opacity="0"/>
    <stop offset=".38" stop-color="#ac8bfd" stop-opacity="0"/>
    <stop offset=".46" stop-color="#ac8bfd" stop-opacity=".55"/>
    <stop offset=".5" stop-color="#4a82fe" stop-opacity=".7"/>
    <stop offset=".54" stop-color="#dcebff" stop-opacity=".45"/>
    <stop offset=".62" stop-color="#4a82fe" stop-opacity="0"/>
    <stop offset="1" stop-color="#ac8bfd" stop-opacity="0"/>
  </linearGradient>
  <!-- Harter Specular-Streifen (Glas-Reflex) -->
  <linearGradient id="nxSpec" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset=".42" stop-color="#dcebff" stop-opacity=".25"/>
    <stop offset=".5" stop-color="#ffffff" stop-opacity=".92"/>
    <stop offset=".58" stop-color="#dcebff" stop-opacity=".25"/>
    <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <!-- Prismatisches Refraktionsband (Regenbogen-Kante hinter dem Specular) -->
  <linearGradient id="nxPrisma" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ac8bfd" stop-opacity="0"/>
    <stop offset=".3" stop-color="#e86bd0" stop-opacity=".38"/>
    <stop offset=".5" stop-color="#4a82fe" stop-opacity=".5"/>
    <stop offset=".7" stop-color="#35d0f2" stop-opacity=".42"/>
    <stop offset="1" stop-color="#9ad7ff" stop-opacity="0"/>
  </linearGradient>
  <!-- 4-Punkt-Diamant-Glint -->
  <path id="nxSpark" d="M0,-30 C4,-7 7,-4 30,0 C7,4 4,7 0,30 C-4,7 -7,4 -30,0 C-7,-4 -4,-7 0,-30 Z" fill="currentColor"/>
  <!-- Randlicht = NUR weicher blauer Aussen-Halo (atmet). KEIN umlaufender Innenrand — die weissen
       Lichter sitzen selektiv auf den beleuchteten Graten (siehe nxEdges), unten/rechts bleibt dunkel
       → „sleeker Look" wie in Dennis' Referenz. -->
  <filter id="nxRim" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
    <feMorphology in="SourceAlpha" operator="dilate" radius="3.5" result="dil"/>
    <feGaussianBlur in="dil" stdDeviation="12" result="halo"/>
    <feFlood flood-color="#4a82fe" flood-opacity=".7"><animate attributeName="flood-opacity" values=".4;.72;.4" dur="3.8s" repeatCount="indefinite"/></feFlood>
    <feComposite in2="halo" operator="in" result="oglow"/>
    <feMerge><feMergeNode in="oglow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  
  </defs>

    <!-- Körper mit weichem Aussen-Halo -->
    <g filter="url(#nxRim)"><use href="#nxBody"/></g>
    <!-- SLEEKE WEISSE KANTEN: nur die beleuchteten Grate (wie Dennis' Referenz) -->
    <g id="nxEdges" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Hauptgrat: lange Diagonale (Spitze links-oben → Kerbe → Boden-Spitze) -->
      <polyline points="64.91,9.89 201.99,171.03 334.09,346.11" stroke="#ffffff" stroke-width="5" opacity=".95"/>
      <!-- Rechter Arm: obere Kante bis zur scharfen Spitze -->
      <polyline points="273.22,67.57 324.6,90.98 394.78,0" stroke="#f4f9ff" stroke-width="4.4" opacity=".92"/>
      <!-- Linker Arm: innere obere Kante -->
      <line x1="64.91" y1="9.89" x2="110.61" y2="121.51" stroke="#eaf2ff" stroke-width="3.4" opacity=".85"/>
      <!-- Linker Arm: äußere obere Silhouette (dezent) -->
      <line x1="64.91" y1="9.89" x2="40.68" y2="138.6" stroke="#cfe0ff" stroke-width="2.2" opacity=".5"/>
      <!-- Rechter Arm: innere Kante (dezent) -->
      <line x1="324.6" y1="90.98" x2="297.34" y2="206.4" stroke="#dbe8ff" stroke-width="2.4" opacity=".48"/>
    </g>
    <!-- Facetten-Schillern: Violet / Blau / Eis (gestaffelt, screen) — kein Weiß-Blitz -->
    <g style="mix-blend-mode:screen">
      <polygon fill="#ac8bfd" opacity="0" points="64.91 9.89 156.43 232.68 201.99 171.03 64.91 9.89"><animate attributeName="opacity" values="0;.38;0" keyTimes="0;.12;1" dur="4.6s" repeatCount="indefinite"/></polygon>
      <polygon fill="#dcebff" opacity="0" points="358.29 210.96 319.71 111.69 324.6 90.98 394.78 0 358.29 210.96"><animate attributeName="opacity" values="0;.36;0" keyTimes="0;.1;1" dur="5.2s" begin="1.3s" repeatCount="indefinite"/></polygon>
      <polygon fill="#4a82fe" opacity="0" points="273.22 67.57 394.78 0 324.6 90.98 273.22 67.57"><animate attributeName="opacity" values="0;.34;0" keyTimes="0;.13;1" dur="4.9s" begin="2.7s" repeatCount="indefinite"/></polygon>
      <polygon fill="#ac8bfd" opacity="0" points="40.68 138.6 75.34 249.63 0 356.03 40.68 138.6"><animate attributeName="opacity" values="0;.3;0" keyTimes="0;.12;1" dur="5.6s" begin="3.8s" repeatCount="indefinite"/></polygon>
      <polygon fill="#4a82fe" opacity="0" points="201.99 171.03 243.17 116.45 64.91 9.89 201.99 171.03"><animate attributeName="opacity" values="0;.32;0" keyTimes="0;.11;1" dur="5s" begin="0.7s" repeatCount="indefinite"/></polygon>
    </g>
    <!-- Diagonaler Lichtreflex über den geschliffenen Stein -->
    <g clip-path="url(#nxSil)" style="mix-blend-mode:screen">
      <!-- Haupt-Sweep: harter Glas-Reflex + prismatische Kante dahinter -->
      <g transform="rotate(-22 197 178)">
        <rect y="-160" width="120" height="640" fill="url(#nxSpec)"><animate attributeName="x" values="-380;540" dur="2.8s" repeatCount="indefinite"/></rect>
        <rect y="-160" width="64" height="640" fill="url(#nxPrisma)"><animate attributeName="x" values="-450;470" dur="2.8s" repeatCount="indefinite"/></rect>
        <rect y="-160" width="150" height="640" fill="url(#nxSweep)"><animate attributeName="x" values="-360;520" dur="5.4s" begin="1.1s" repeatCount="indefinite"/></rect>
      </g>
      <!-- Gegen-Sweep aus anderem Winkel: Kreuz-Reflex wie beim Drehen des Kristalls -->
      <g transform="rotate(34 197 178)">
        <rect y="-220" width="70" height="760" fill="url(#nxSpec)" opacity=".55"><animate attributeName="x" values="560;-420" dur="3.9s" begin=".9s" repeatCount="indefinite"/></rect>
      </g>
      <!-- Facetten-Blitz-Kaskade: einzelne Flächen fangen nacheinander das Licht -->
      <g fill="#f2f7ff">
        <polygon points="64.91 9.89 156.43 232.68 201.99 171.03 64.91 9.89" opacity="0"><animate attributeName="opacity" values="0;0;.5;0;0" keyTimes="0;.1;.16;.24;1" dur="2.8s" repeatCount="indefinite"/></polygon>
        <polygon points="201.99 171.03 243.17 116.45 334.09 346.11 201.99 171.03" opacity="0"><animate attributeName="opacity" values="0;0;.45;0;0" keyTimes="0;.28;.34;.42;1" dur="2.8s" repeatCount="indefinite"/></polygon>
        <polygon points="273.22 67.57 394.78 0 324.6 90.98 273.22 67.57" opacity="0"><animate attributeName="opacity" values="0;0;.6;0;0" keyTimes="0;.44;.5;.58;1" dur="2.8s" repeatCount="indefinite"/></polygon>
        <polygon points="358.29 210.96 319.71 111.69 324.6 90.98 394.78 0 358.29 210.96" opacity="0"><animate attributeName="opacity" values="0;0;.4;0;0" keyTimes="0;.56;.62;.7;1" dur="2.8s" repeatCount="indefinite"/></polygon>
        <polygon points="0 356.03 125.43 285.1 75.34 249.63 0 356.03" opacity="0"><animate attributeName="opacity" values="0;0;.45;0;0" keyTimes="0;.72;.78;.86;1" dur="2.8s" repeatCount="indefinite"/></polygon>
        <polygon points="40.68 138.6 101.42 154.43 110.61 121.51 64.91 9.89 40.68 138.6" opacity="0"><animate attributeName="opacity" values="0;0;.38;0;0" keyTimes="0;.86;.92;.98;1" dur="2.8s" repeatCount="indefinite"/></polygon>
      </g>
    </g>
    <!-- Spitzen-Glints (leiser, farbig via currentColor) -->
    <g style="mix-blend-mode:screen" opacity=".7">
      <g transform="translate(394.78 0)" style="color:#dcebff"><use href="#nxSpark" opacity="0"><animate attributeName="opacity" values="0;.55;0" keyTimes="0;.5;1" dur="4.4s" begin=".4s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="scale" values=".2;1;.2" keyTimes="0;.5;1" dur="4.4s" begin=".4s" repeatCount="indefinite"/></use></g>
      <g transform="translate(64.91 9.89)" style="color:#ac8bfd"><use href="#nxSpark" opacity="0"><animate attributeName="opacity" values="0;.5;0" keyTimes="0;.5;1" dur="5s" begin="2.1s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="scale" values=".2;.85;.2" keyTimes="0;.5;1" dur="5s" begin="2.1s" repeatCount="indefinite"/></use></g>
      <g transform="translate(0 356.03)" style="color:#4a82fe"><use href="#nxSpark" opacity="0"><animate attributeName="opacity" values="0;.42;0" keyTimes="0;.5;1" dur="5.6s" begin="3.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="scale" values=".2;.7;.2" keyTimes="0;.5;1" dur="5.6s" begin="3.3s" repeatCount="indefinite"/></use></g>
      <g transform="translate(334.09 346.11)" style="color:#4a82fe"><use href="#nxSpark" opacity="0"><animate attributeName="opacity" values="0;.48;0" keyTimes="0;.5;1" dur="5.2s" begin="1.5s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="scale" values=".2;.75;.2" keyTimes="0;.5;1" dur="5.2s" begin="1.5s" repeatCount="indefinite"/></use></g>
    </g>
  
</svg>
